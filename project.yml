name: HealthFlow
options:
  bundleIdPrefix: com.healthflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  HealthFlow:
    type: application
    platform: iOS
    sources:
      - HealthFlow
    info:
      path: HealthFlow/Info.plist
      properties:
        NSHealthShareUsageDescription: "HealthFlow 需要读取您的健康数据以展示运动、睡眠和生理指标信息"
        NSHealthUpdateUsageDescription: "HealthFlow 需要写入权限以记录您手动录入的健康数据"
        NSFaceIDUsageDescription: "HealthFlow 使用面容识别保护您的健康数据隐私"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: HealthFlow/HealthFlow.entitlements
    settings:
      base:
        INFOPLIST_FILE: HealthFlow/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.healthflow.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
  HealthFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HealthFlowTests
    dependencies:
      - target: HealthFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthflow.app.tests
        GENERATE_INFOPLIST_FILE: true